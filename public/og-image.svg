<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e1e1e"/>
      <stop offset="100%" stop-color="#141414"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.15" cy="0.4" r="0.6">
      <stop offset="0%" stop-color="#0098ff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#0098ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="1200" height="36" fill="#181818"/>
  <rect x="0" y="35" width="1200" height="1" fill="#2b2b2b"/>
  <path d="M22 12 L34 6 L34 30 L22 24 L14 28 L14 14 L22 18 L34 6" fill="#0098FF"/>
  <text x="600" y="23" fill="#9a9a9a" font-family="Segoe UI, system-ui, sans-serif" font-size="12" text-anchor="middle">
    Harshit Rajput Portfolio — Visual Studio Code
  </text>
  <g transform="translate(1110, 12)" fill="#cccccc">
    <rect x="0"  y="6" width="14" height="2"/>
    <rect x="22" y="0" width="14" height="14" fill="none" stroke="#cccccc" stroke-width="1.5"/>
    <path d="M48,0 L62,14 M62,0 L48,14" stroke="#cccccc" stroke-width="1.5"/>
  </g>

  <!-- Activity bar -->
  <rect x="0" y="36" width="56" height="572" fill="#181818"/>
  <rect x="56" y="36" width="1" height="572" fill="#2b2b2b"/>
  <g fill="#858585" transform="translate(20, 80)">
    <rect x="0" y="0" width="18" height="22" rx="1" fill="none" stroke="#ffffff" stroke-width="1.5"/>
    <rect x="-2" y="0" width="2" height="22" fill="#ffffff"/>
  </g>
  <circle cx="29" cy="138" r="9" fill="none" stroke="#858585" stroke-width="1.5"/>
  <line x1="35" y1="144" x2="42" y2="151" stroke="#858585" stroke-width="1.5" stroke-linecap="round"/>
  <g transform="translate(20, 184)" fill="#858585">
    <circle cx="3" cy="3" r="3"/>
    <circle cx="15" cy="3" r="3"/>
    <circle cx="3" cy="18" r="3"/>
    <circle cx="15" cy="18" r="3"/>
    <line x1="3" y1="6" x2="3" y2="15" stroke="#858585" stroke-width="1.5"/>
    <line x1="6" y1="3" x2="12" y2="3" stroke="#858585" stroke-width="1.5"/>
  </g>

  <!-- Breadcrumb -->
  <text x="120" y="92" fill="#858585" font-family="Segoe UI, system-ui, sans-serif" font-size="13">
    portfolio  ›  src  ›
    <tspan fill="#cccccc"> identity.ts</tspan>
  </text>

  <!-- Big name -->
  <text x="120" y="200" fill="#ffffff" font-family="Segoe UI, system-ui, sans-serif" font-size="84" font-weight="300" letter-spacing="-1">
    Harshit Rajput
  </text>

  <!-- Tagline -->
  <text x="120" y="248" fill="#cccccc" font-family="Segoe UI, system-ui, sans-serif" font-size="26" font-weight="400">
    Full-Stack Developer · Bhopal, India
  </text>

  <!-- Status pill -->
  <g transform="translate(120, 280)">
    <rect x="0" y="0" width="216" height="30" rx="15" fill="rgba(46,160,67,0.10)" stroke="#2f5d3a" stroke-width="1"/>
    <circle cx="18" cy="15" r="5" fill="#4ade80"/>
    <text x="32" y="20" fill="#4ade80" font-family="Segoe UI, system-ui, sans-serif" font-size="13" font-weight="500">
      Open to opportunities
    </text>
  </g>

  <!-- Code snippet -->
  <g font-family="Cascadia Code, Consolas, monospace" font-size="22">
    <text x="120" y="392">
      <tspan fill="#858585">1  </tspan>
      <tspan fill="#569CD6">const</tspan>
      <tspan fill="#4FC1FF" dx="10">stack</tspan>
      <tspan fill="#D4D4D4" dx="10">= [</tspan>
    </text>
    <text x="120" y="426">
      <tspan fill="#858585">2  </tspan>
      <tspan fill="#D4D4D4" dx="20">  </tspan>
      <tspan fill="#CE9178">'React'</tspan><tspan fill="#D4D4D4">, </tspan>
      <tspan fill="#CE9178">'Node.js'</tspan><tspan fill="#D4D4D4">, </tspan>
      <tspan fill="#CE9178">'MongoDB'</tspan><tspan fill="#D4D4D4">,</tspan>
    </text>
    <text x="120" y="460">
      <tspan fill="#858585">3  </tspan>
      <tspan fill="#D4D4D4" dx="20">  </tspan>
      <tspan fill="#CE9178">'Express.js'</tspan><tspan fill="#D4D4D4">, </tspan>
      <tspan fill="#CE9178">'Next.js'</tspan><tspan fill="#D4D4D4">, </tspan>
      <tspan fill="#CE9178">'TypeScript'</tspan><tspan fill="#D4D4D4">,</tspan>
    </text>
    <text x="120" y="494">
      <tspan fill="#858585">4  </tspan>
      <tspan fill="#D4D4D4">] </tspan>
      <tspan fill="#569CD6">as</tspan>
      <tspan fill="#569CD6" dx="10">const</tspan>
      <tspan fill="#D4D4D4">;</tspan>
    </text>
  </g>

  <!-- Bottom hint -->
  <text x="120" y="568" fill="#858585" font-family="Segoe UI, system-ui, sans-serif" font-size="15">
    Press
    <tspan fill="#cccccc"> Ctrl + J </tspan>
    to open the terminal · Built with React + Vite
  </text>

  <!-- Status bar -->
  <rect x="0" y="608" width="1200" height="22" fill="#181818"/>
  <rect x="0" y="607" width="1200" height="1" fill="#2b2b2b"/>
  <text x="14" y="623" fill="#cccccc" font-family="Segoe UI, system-ui, sans-serif" font-size="11">
    ⚑ main
  </text>
  <text x="100" y="623" fill="#cccccc" font-family="Segoe UI, system-ui, sans-serif" font-size="11">
    0 errors, 0 warnings
  </text>
  <text x="1186" y="623" fill="#cccccc" font-family="Segoe UI, system-ui, sans-serif" font-size="11" text-anchor="end">
    TypeScript JSX
  </text>
  <text x="1080" y="623" fill="#cccccc" font-family="Segoe UI, system-ui, sans-serif" font-size="11" text-anchor="end">
    UTF-8
  </text>
</svg>
